name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to approve'
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check JS files
        run: |
          changed=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }}..${{ github.sha }} -- '*.js' '*.mjs' '*.cjs' || true)
          if [ -n "$changed" ]; then
            echo "Checking: $changed"
            echo "$changed" | xargs -I{} node --check "{}"
          else
            echo "No JS files changed"
          fi

      - name: Validate spec files
        run: |
          for f in docs/specs/**/*.md; do
            [ -f "$f" ] || continue
            head -1 "$f" | grep -q '^#' || echo "WARNING: $f missing heading"
          done
          echo "Spec validation complete"

      - name: Auto-approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          gh pr review "$PR_NUMBER" --approve --body "Automated approval - PR checks passed"
