name: Block PR
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to block
        required: true
permissions:
  pull-requests: write
jobs:
  block:
    runs-on: ubuntu-latest
    steps:
      - name: Request changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}/reviews \
            -f event="REQUEST_CHANGES" \
            -f body="Blocking for gate test"
